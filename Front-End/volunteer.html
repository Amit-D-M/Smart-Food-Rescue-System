<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volunteer Dashboard - Smart Food Rescue</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #f7f8fc;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #667eea;
    margin-bottom: 10px;
  }

  h2 {
    color: #764ba2;
    margin: 30px 0 15px 0;
    text-align: center;
  }

  .section {
    margin-bottom: 50px;
  }

  .list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  .card {
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: transform 0.3s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card:hover { transform: translateY(-5px); }

  .card h3 { color: #667eea; margin-bottom: 5px; }
  .card p { margin: 2px 0; }

  .card button {
    background: #28a745;
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
  }

  .card button:hover { background: #218838; transform: scale(1.05); }

  a.back-link {
    display: block;
    margin: 30px auto;
    text-align: center;
    font-weight: 600;
    color: #667eea;
    text-decoration: none;
    transition: 0.3s;
  }

  a.back-link:hover { color: #764ba2; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffc107;
    color: #000;
    padding: 15px 25px;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s, transform 0.5s;
  }

  .toast.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(-10px);
  }
</style>
</head>
<body>

<h1>🙋 Volunteer Dashboard</h1>

<section class="section">
  <h2>Available Food</h2>
  <div id="availableList" class="list"></div>
</section>

<section class="section">
  <h2>Accepted Food / History</h2>
  <div id="acceptedList" class="list"></div>
</section>

<a href="role.html" class="back-link">← Back</a>

<div id="toast" class="toast"></div>

<script>
async function loadVolunteerData() {
  try {
    const res = await fetch("http://localhost:5000/foods");
    const foods = await res.json();

    let availableOutput = "";
    let acceptedOutput = "";

    foods.forEach((item) => {
      const cardHTML = `
        <div class="card">
          <h3>${item.name}</h3>
          <p><b>Quantity:</b> ${item.qty}</p>
          <p><b>Location:</b> ${item.location}</p>
          <p><b>Pickup Time:</b> ${item.time || "N/A"}</p>
          <p><b>Status:</b> ${item.status}</p>

          ${item.status === "Available" ? `<button onclick="acceptFood('${item._id}')">Accept Food</button>` : ""}

          ${item.status === "Accepted" ? `<p><b>Accepted At:</b> ${item.acceptedAt || "N/A"}</p>` : ""}
          ${item.status === "Delivered" ? `<p><b>Delivered At:</b> ${item.deliveredAt || "N/A"}</p>` : ""}
        </div>
      `;

      if(item.status === "Available") availableOutput += cardHTML;
      if(item.status === "Accepted" || item.status === "Delivered") acceptedOutput += cardHTML;
    });

    document.getElementById("availableList").innerHTML = availableOutput || "<p style='text-align:center;'>No available food.</p>";
    document.getElementById("acceptedList").innerHTML = acceptedOutput || "<p style='text-align:center;'>No accepted food yet.</p>";

  } catch (err) {
    console.error(err);
  }
}

window.acceptFood = async function(id) {
  await fetch(`http://localhost:5000/accept/${id}`, { method: "POST" });
  showToast("Food accepted! 💚");
  loadVolunteerData();
};

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3000);
}

const volunteerEvents = new EventSource("http://localhost:5000/events");
volunteerEvents.onmessage = function(event) {
  const data = JSON.parse(event.data);
  if (data.type === 'newFood') {
    showToast(`New food: ${data.food.name}`);
    loadVolunteerData();
  }
};

loadVolunteerData();
</script>

</body>
</html>
